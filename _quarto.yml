project:
  type: website
  output-dir: docs
  resources:
    - "clases/**/*.R"
    - "clases/**/*.csv"
    - "clases/**/tarea-*.qmd"
    - "clases/**/*laboratorio-*.qmd"

website:
  title: "IA para Científicos Sociales"
  description: "Curso intensivo. Escuela en Métodos, Universidad Católica del Uruguay"
  page-navigation: true
  back-to-top-navigation: true
  reader-mode: true
  repo-url: https://github.com/danilofreire/introduccion-ia-ucu
  repo-actions: [issue, source]
  navbar:
    pinned: true
    background: "#1E3A5F"
    foreground: "#F9F8F6"
    left:
      - href: index.qmd
        text: Inicio
      - href: programa.qmd
        text: Programa
      - href: laboratorios.qmd
        text: Laboratorios
      - href: lecturas.qmd
        text: Lecturas
    right:
      - icon: envelope
        href: mailto:danilofreire@gmail.com
        aria-label: Email
      - icon: github
        href: https://github.com/danilofreire/introduccion-ia-ucu
        aria-label: GitHub
  page-footer:
    left: |
      &copy; 2026 [Danilo Freire](https://danilofreire.github.io). Contenido bajo licencia [MIT](https://opensource.org/licenses/MIT).
    right: |
      Hecho con [Quarto](https://quarto.org)

format:
  html:
    theme:
      - flatly
      - custom.scss
    lang: es
    toc: true
    fontsize: "1.05rem"
    linestretch: 1.6
    mainfont: "'Source Serif 4', 'Georgia', serif"
    monofont: "'JetBrains Mono', monospace"
    include-in-header:
      - text: |
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300..900;1,8..60,300..900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
